# Nginx reverse proxy + TLS for ai-gateway.
# Place in /etc/nginx/sites-available/ai-gateway and symlink to sites-enabled.
# Obtain the cert with: certbot --nginx -d ai.example.com

server {
    listen 80;
    server_name ai.example.com;
    # Redirect all HTTP to HTTPS.
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    server_name ai.example.com;

    ssl_certificate     /etc/letsencrypt/live/ai.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ai.example.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # Optional but recommended: restrict to the CMS server / VPN range.
    # allow 10.0.0.0/8;
    # deny all;

    # AI generation can take a while — raise timeouts above the gateway's own.
    proxy_read_timeout 180s;
    proxy_send_timeout 180s;
    client_max_body_size 2m;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
